<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMR | Meu Perfil</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="../css/auth.css">
    <link rel="stylesheet" href="../css/profile.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
</head>
<body>
    <header class="navbar">
        <div class="container nav-content">
            <div class="brand">
                <span class="logo"><img src="../assets/EMR.png" alt=""></span>
                <span class="sub-logo">By DeadPool</span>
            </div>
            <nav class="nav-links">
                <button class="but-type-2 btn-auth" onclick="window.location.href = '../index.html'">Voltar ao
                    inicio</button>
            </nav>
        </div>
    </header>
    <main class="dashboard-container container">
    <!-- Seção de Perfil (Esquerda) -->
    <section class="profile-section">
        <div class="user-info">
            <div class="profile-avatar"></div>
            <div class="user-names">
                <h1>Olá Apelido</h1>
                <span>Fulano de Cilano Beltrano</span>
            </div>
        </div>

        <form class="edit-profile-form">
            <input type="text" value="Apelido" placeholder="Apelido">
            <input type="email" value="email@exemplo.com" placeholder="E-mail">
            <input type="password" value="********" placeholder="Senha">
            
            <button type="submit" class="but-type-1">Salvar</button>
        </form>
    </section>

    <!-- Seção de Eventos (Direita) -->
    <section class="my-events-card">
        <h2>Meus eventos</h2>
        <div class="tabs-nav">
            <button class="tab-btn active" onclick="switchTab('historico')">Histórico</button>
            <button class="tab-btn" onclick="switchTab('futuros')">Futuros</button>
        </div>
        
        <div id="tab-content" class="tab-content">
            <!-- Conteúdo dinâmico será injetado aqui -->
            <p class="empty-msg">Nenhum evento no histórico.</p>
        </div>
    </section>
</main>

<script src="../main.js"></script>
</body>
</html>
